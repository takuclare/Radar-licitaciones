name: Actualizar snapshot de licitaciones

on:
  workflow_dispatch:
  schedule:
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'

permissions:
  contents: write

concurrency:
  group: snapshot-licitaciones
  cancel-in-progress: false

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout rama principal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias del worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Crear rama snapshot-data si no existe
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin snapshot-data; then
            echo "La rama snapshot-data ya existe."
          else
            DEFAULT_BRANCH="${GITHUB_REF_NAME}"
            git checkout --orphan snapshot-data
            git reset --hard
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            mkdir -p data
            echo "# Datos cacheados para la app" > README.md
            touch data/.gitkeep
            git add README.md data/.gitkeep
            git commit -m "Inicializar rama snapshot-data"
            git push origin snapshot-data
            git checkout "$DEFAULT_BRANCH"
            git reset --hard "origin/$DEFAULT_BRANCH"
          fi

      - name: Montar rama snapshot-data como worktree
        run: |
          rm -rf snapshot_branch
          git worktree add snapshot_branch snapshot-data
          mkdir -p snapshot_branch/data

      - name: Generar instantánea JSON
        env:
          DATA_EXCEL: data/TRABAJOS AIRIA.xlsx
          SNAPSHOT_OUTPUT_DIR: snapshot_branch/data
          SNAPSHOT_LIMIT_PER_FEED: '3000'
          SNAPSHOT_MAX_FEED_PAGES: '15'
          SNAPSHOT_ONLY_LAST_DAYS: '2'
          SNAPSHOT_EXCLUDE_DEADLINE_SOON_DAYS: '2'
        run: |
          python workers/build_snapshot.py

      - name: Publicar cambios en snapshot-data
        shell: bash
        run: |
          cd snapshot_branch
          git add data/latest_tenders_snapshot.json data/latest_tenders_snapshot_cpv.json
          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualizar snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin snapshot-data
          fi
